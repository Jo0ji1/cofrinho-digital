name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --legacy-peer-deps

      - run: npx expo export --platform web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Enhance HTML for SEO & PWA
        run: |
          sed -i 's|<html lang="en">|<html lang="pt-BR">|' dist/index.html
          sed -i 's|<title>Poupi</title>|<title>Poupi — Seu assistente de economia</title>|' dist/index.html
          sed -i '/<\/title>/a \
          <meta name="description" content="Organize suas economias, acompanhe seu progresso e alcance seus objetivos financeiros." />\
          <meta name="theme-color" content="#10B981" />\
          <meta name="apple-mobile-web-app-capable" content="yes" />\
          <meta name="apple-mobile-web-app-title" content="Poupi" />\
          <link rel="icon" type="image/png" href="/cofrinho-digital/assets/icon.png" />\
          <link rel="apple-touch-icon" href="/cofrinho-digital/assets/icon.png" />\
          <meta property="og:title" content="Poupi" />\
          <meta property="og:description" content="Organize suas economias e alcance seus objetivos financeiros." />\
          <meta property="og:type" content="website" />\
          <meta property="og:url" content="https://jo0ji1.github.io/cofrinho-digital/" />\
          <meta property="og:image" content="https://jo0ji1.github.io/cofrinho-digital/assets/icon.png" />' dist/index.html

      - name: Copy assets for favicon/OG
        run: cp -r assets dist/assets 2>/dev/null || true

      - name: Add 404.html for SPA routing
        run: cp dist/index.html dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
